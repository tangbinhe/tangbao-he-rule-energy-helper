<script type="text/javascript">
  RED.nodes.registerType('rule-energy-manager', {
    category: 'edge',
    color: '#3FADB5',
    defaults: {
      name: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-cogs',
    label: function() {
      return this.name || '规则管理';
    },
    labelStyle: function() {
      return this.name ? 'node_label_italic' : '';
    },
    oneditprepare: function() {
      var nodeId = this.id;
      loadRuleList(nodeId);
      loadStatus(nodeId);

      // 刷新按钮
      $('#btn-refresh-rules').on('click', function() {
        loadRuleList(nodeId);
        loadStatus(nodeId);
      });

      // 查看详情按钮委托
      $('#rule-list-table').on('click', '.btn-view-detail', function() {
        var chainName = $(this).data('chain');
        loadRuleDetail(nodeId, chainName);
      });

      // 删除规则按钮委托
      $('#rule-list-table').on('click', '.btn-delete-rule', function() {
        var chainName = $(this).data('chain');
        if (confirm('该规则由云端下发，确定要删除吗？\n\n规则链: ' + chainName)) {
          deleteRule(nodeId, chainName);
        }
      });

      // 删除时间配置按钮委托
      $('#time-list-table').on('click', '.btn-delete-time', function() {
        var timeName = $(this).data('time');
        if (confirm('该时间配置由云端下发，确定要删除吗？\n\n时间名称: ' + timeName)) {
          deleteTime(nodeId, timeName);
        }
      });

      function deleteRule(nodeId, chainName) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/rule/' + encodeURIComponent(chainName),
          type: 'DELETE',
          success: function(data) {
            alert('删除成功');
            loadRuleList(nodeId);
            loadStatus(nodeId);
          },
          error: function(xhr) {
            alert('删除失败: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : '未知错误'));
          }
        });
      }

      function deleteTime(nodeId, timeName) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/time/' + encodeURIComponent(timeName),
          type: 'DELETE',
          success: function(data) {
            alert('删除成功');
            loadTimeList(nodeId);
            loadStatus(nodeId);
          },
          error: function(xhr) {
            alert('删除失败: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : '未知错误'));
          }
        });
      }

      function loadStatus(nodeId) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/status',
          type: 'GET',
          success: function(data) {
            $('#status-rules').text(data.ruleCount || 0);
            $('#status-times').text(data.timeCount || 0);
            $('#status-mappings').text(data.mappingCount || 0);
          },
          error: function() {
            $('#status-rules').text('-');
            $('#status-times').text('-');
            $('#status-mappings').text('-');
          }
        });
      }

      function loadRuleList(nodeId) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/rules',
          type: 'GET',
          success: function(data) {
            var tbody = $('#rule-list-table tbody');
            tbody.empty();
            if (!data.rules || data.rules.length === 0) {
              tbody.append('<tr><td colspan="6" style="text-align:center;color:#999;">暂无规则</td></tr>');
              return;
            }
            data.rules.forEach(function(rule) {
              var typeText = rule.ruleType === '1' ? '控制' : (rule.ruleType === '2' ? '告警' : rule.ruleType);
              var sourceText = rule.ruleSource === 'control' ? '控制' : (rule.ruleSource === 'alarm' ? '告警' : rule.ruleSource);
              var row = '<tr>' +
                '<td>' + (rule.chainName || '-') + '</td>' +
                '<td>' + (rule.ruleId || '-') + '</td>' +
                '<td>' + typeText + '</td>' +
                '<td>' + sourceText + '</td>' +
                '<td>' + (rule.effectTimeName || '-') + '</td>' +
                '<td>' +
                '<button class="btn-view-detail" data-chain="' + rule.chainName + '" style="padding:2px 8px;margin-right:4px;">查看</button>' +
                '<button class="btn-delete-rule" data-chain="' + rule.chainName + '" style="padding:2px 8px;color:#c00;">删除</button>' +
                '</td>' +
                '</tr>';
              tbody.append(row);
            });
          },
          error: function() {
            var tbody = $('#rule-list-table tbody');
            tbody.empty();
            tbody.append('<tr><td colspan="6" style="text-align:center;color:#999;">加载失败，请确保节点已部署</td></tr>');
          }
        });
      }

      function loadRuleDetail(nodeId, chainName) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/rule/' + encodeURIComponent(chainName),
          type: 'GET',
          success: function(data) {
            if (data.rule) {
              $('#detail-content').text(JSON.stringify(data.rule, null, 2));
              $('#detail-dialog').show();
            } else {
              alert('规则不存在');
            }
          },
          error: function() {
            alert('加载详情失败');
          }
        });
      }

      $('#btn-close-detail').on('click', function() {
        $('#detail-dialog').hide();
      });

      function loadTimeList(nodeId) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/times',
          type: 'GET',
          success: function(data) {
            var tbody = $('#time-list-table tbody');
            tbody.empty();
            if (!data.times || Object.keys(data.times).length === 0) {
              tbody.append('<tr><td colspan="4" style="text-align:center;color:#999;">暂无时间配置</td></tr>');
              return;
            }
            Object.entries(data.times).forEach(function([timeName, timeConfig]) {
              var typeText = timeConfig.timeType === '1' ? '每天' : (timeConfig.timeType === '2' ? '工作日' : (timeConfig.timeType === '3' ? '周末' : timeConfig.timeType));
              var row = '<tr>' +
                '<td>' + (timeName || '-') + '</td>' +
                '<td>' + typeText + '</td>' +
                '<td>' + (timeConfig.begin || '-') + ' ~ ' + (timeConfig.end || '-') + '</td>' +
                '<td>' +
                '<button class="btn-view-time-detail" data-time="' + timeName + '" style="padding:2px 8px;margin-right:4px;">查看</button>' +
                '<button class="btn-delete-time" data-time="' + timeName + '" style="padding:2px 8px;color:#c00;">删除</button>' +
                '</td>' +
                '</tr>';
              tbody.append(row);
            });
          },
          error: function() {
            var tbody = $('#time-list-table tbody');
            tbody.empty();
            tbody.append('<tr><td colspan="4" style="text-align:center;color:#999;">加载失败</td></tr>');
          }
        });
      }

      $('#time-list-table').on('click', '.btn-view-time-detail', function() {
        var timeName = $(this).data('time');
        loadTimeDetail(nodeId, timeName);
      });

      function loadTimeDetail(nodeId, timeName) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/time/' + encodeURIComponent(timeName),
          type: 'GET',
          success: function(data) {
            if (data.timeConfig) {
              $('#detail-content').text(JSON.stringify(data.timeConfig, null, 2));
              $('#detail-dialog').show();
            } else {
              alert('时间配置不存在');
            }
          },
          error: function() {
            alert('加载详情失败');
          }
        });
      }

      // 删除映射按钮委托
      $('#mapping-list-table').on('click', '.btn-delete-mapping', function() {
        var pointTypeId = $(this).data('ptid');
        if (confirm('该映射由云端下发，确定要删除吗？\n\n点类型ID: ' + pointTypeId)) {
          deleteMapping(nodeId, pointTypeId);
        }
      });

      function deleteMapping(nodeId, pointTypeId) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/mapping/' + encodeURIComponent(pointTypeId),
          type: 'DELETE',
          success: function(data) {
            alert('删除成功');
            loadMappingList(nodeId);
            loadStatus(nodeId);
          },
          error: function(xhr) {
            alert('删除失败: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : '未知错误'));
          }
        });
      }

      function loadMappingList(nodeId) {
        $.ajax({
          url: 'rule-energy-manager/' + nodeId + '/mappings',
          type: 'GET',
          success: function(data) {
            var tbody = $('#mapping-list-table tbody');
            tbody.empty();
            if (!data.mappings || Object.keys(data.mappings).length === 0) {
              tbody.append('<tr><td colspan="3" style="text-align:center;color:#999;">暂无映射</td></tr>');
              return;
            }
            Object.entries(data.mappings).forEach(function([pointTypeId, chainIds]) {
              var row = '<tr>' +
                '<td>' + pointTypeId + '</td>' +
                '<td>[' + (chainIds || []).join(', ') + ']</td>' +
                '<td><button class="btn-delete-mapping" data-ptid="' + pointTypeId + '" style="padding:2px 8px;color:#c00;">删除</button></td>' +
                '</tr>';
              tbody.append(row);
            });
          },
          error: function() {
            var tbody = $('#mapping-list-table tbody');
            tbody.empty();
            tbody.append('<tr><td colspan="3" style="text-align:center;color:#999;">加载失败</td></tr>');
          }
        });
      }

      // 初始加载时间配置和映射
      loadTimeList(nodeId);
      loadMappingList(nodeId);

      // 刷新按钮同时刷新所有列表
      $('#btn-refresh-rules').off('click').on('click', function() {
        loadRuleList(nodeId);
        loadTimeList(nodeId);
        loadMappingList(nodeId);
        loadStatus(nodeId);
      });
    }
  });
</script>

<script type="text/html" data-template-name="rule-energy-manager">
  <style>
    .rule-manager-panel { margin-top: 10px; }
    .rule-manager-panel h4 { margin: 10px 0 6px 0; font-size: 13px; color: #333; }
    .status-bar { display: flex; gap: 20px; margin-bottom: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; }
    .status-item { font-size: 12px; }
    .status-item .num { font-weight: bold; color: #3FADB5; font-size: 14px; }
    #rule-list-table, #time-list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #rule-list-table th, #rule-list-table td, #time-list-table th, #time-list-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    #rule-list-table th, #time-list-table th { background: #f0f0f0; font-weight: bold; }
    #rule-list-table tr:hover, #time-list-table tr:hover { background: #f9f9f9; }
    .btn-refresh { float: right; margin-bottom: 6px; }
    #mapping-list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #mapping-list-table th, #mapping-list-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    #mapping-list-table th { background: #f0f0f0; font-weight: bold; }
    #mapping-list-table tr:hover { background: #f9f9f9; }
    #detail-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; max-height: 80vh; background: white; border: 1px solid #ccc; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 1000; }
    #detail-dialog .dialog-header { padding: 10px 15px; background: #3FADB5; color: white; font-weight: bold; border-radius: 6px 6px 0 0; display: flex; justify-content: space-between; align-items: center; }
    #detail-dialog .dialog-body { padding: 15px; max-height: 60vh; overflow: auto; }
    #detail-dialog pre { background: #f5f5f5; padding: 10px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    #detail-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; }
  </style>

  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
    <input type="text" id="node-input-name" placeholder="名称">
  </div>

  <div class="rule-manager-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h4><i class="fa fa-list"></i> 当前规则列表</h4>
      <button type="button" id="btn-refresh-rules" class="btn-refresh"><i class="fa fa-refresh"></i> 刷新</button>
    </div>

    <div class="status-bar">
      <div class="status-item">规则: <span class="num" id="status-rules">-</span></div>
      <div class="status-item">时间配置: <span class="num" id="status-times">-</span></div>
      <div class="status-item">映射: <span class="num" id="status-mappings">-</span></div>
    </div>

    <table id="rule-list-table">
      <thead>
        <tr>
          <th>规则链</th>
          <th>规则ID</th>
          <th>类型</th>
          <th>来源</th>
          <th>生效时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6" style="text-align:center;color:#999;">加载中...</td></tr>
      </tbody>
    </table>

    <h4><i class="fa fa-clock-o"></i> 生效时间配置</h4>
    <table id="time-list-table">
      <thead>
        <tr>
          <th>名称</th>
          <th>类型</th>
          <th>时间段</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="4" style="text-align:center;color:#999;">加载中...</td></tr>
      </tbody>
    </table>

    <h4><i class="fa fa-link"></i> 点类型规则映射</h4>
    <table id="mapping-list-table">
      <thead>
        <tr>
          <th>点类型ID</th>
          <th>关联规则链 (chain*)</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="3" style="text-align:center;color:#999;">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="detail-overlay"></div>
  <div id="detail-dialog">
    <div class="dialog-header">
      <span>规则详情</span>
      <button type="button" id="btn-close-detail" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">&times;</button>
    </div>
    <div class="dialog-body">
      <pre id="detail-content"></pre>
    </div>
  </div>
</script>

<script type="text/html" data-help-name="rule-energy-manager">
  <p>边缘规则管理节点，接收云端下发的规则配置报文。</p>

  <h3>输入</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>云端下发的报文，支持以下两种格式：
      <ul>
        <li>完整报文：包含 <code>messageContent.detail[]</code></li>
        <li>简化结构：直接包含 <code>rulePubType</code> 的单条数据</li>
      </ul>
    </dd>
  </dl>

  <h3>输出</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>操作结果，包含 <code>type</code> 字段：
      <ul>
        <li><code>ruleUpdated</code> — 规则已创建/更新</li>
        <li><code>timeUpdated</code> — 时间配置已更新</li>
        <li><code>mappingUpdated</code> — 点类型映射已更新</li>
        <li><code>ruleDeleted</code> — 规则已删除</li>
        <li><code>error</code> — 处理失败</li>
      </ul>
    </dd>
  </dl>

  <h3>支持的 rulePubType</h3>
  <ul>
    <li><code>ruleAndPointInfo</code> — 创建/更新规则及点位信息</li>
    <li><code>edgeRelativeTime</code> — 生效时间配置</li>
    <li><code>pointTypeRuleMapping</code> — 点类型与规则映射</li>
    <li><code>deleteRule</code> — 删除规则</li>
  </ul>

  <h3>查询功能</h3>
  <p>发送 <code>msg.payload.action</code> 进行查询：</p>
  <ul>
    <li><code>getRules</code> — 获取所有规则摘要</li>
    <li><code>getRule</code> — 获取单条规则（需指定 chainName）</li>
    <li><code>getTimes</code> — 获取所有时间配置</li>
    <li><code>getMappings</code> — 获取所有点类型映射</li>
    <li><code>getStatus</code> — 获取缓存状态统计</li>
  </ul>
</script>
