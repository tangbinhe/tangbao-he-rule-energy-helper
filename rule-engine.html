<script type="text/javascript">
  RED.nodes.registerType('rule-energy-engine', {
    category: 'edge',
    color: '#B53FAE',
    defaults: {
      name: { value: '' },
      batchTriggerMode: { value: 'once' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-bolt',
    label: function() {
      return this.name || '规则引擎';
    },
    labelStyle: function() {
      return this.name ? 'node_label_italic' : '';
    },
    oneditprepare: function() {
      // 编辑器初始化
    }
  });
</script>

<script type="text/html" data-template-name="rule-energy-engine">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
    <input type="text" id="node-input-name" placeholder="名称">
  </div>
  <div class="form-row">
    <label for="node-input-batchTriggerMode"><i class="fa fa-list"></i> 批量触发模式</label>
    <select id="node-input-batchTriggerMode" style="width:70%">
      <option value="once">一次（收集所有点值后执行一次）</option>
      <option value="each">逐条（每个点单独触发一次）</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="rule-energy-engine">
  <p>边缘规则执行节点，接收点值上报，匹配并执行规则链，输出控制/告警/恢复消息。</p>

  <h3>输入</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object | array</span></dt>
    <dd>点值上报数据，支持单条或批量：
      <pre>
// 单条
{
  "pointId": "...",
  "slotPath": "...",
  "value": "123"
}

// 批量
[
  { "pointId": "...", "slotPath": "...", "value": "123" },
  { "pointId": "...", "slotPath": "...", "value": "0" }
]
      </pre>
    </dd>
  </dl>

  <h3>输出</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>执行结果，包含以下类型：
      <ul>
        <li><code>type: "control"</code> — 控制输出消息</li>
        <li><code>type: "alarm"</code> — 告警输出消息</li>
        <li><code>type: "alarmRecovery"</code> — 告警恢复消息</li>
      </ul>
    </dd>
  </dl>

  <h3>配置</h3>
  <dl class="message-properties">
    <dt>批量触发模式 <span class="property-type">string</span></dt>
    <dd>
      <ul>
        <li><code>once</code> — 收集批量点值中所有关联的规则，每个规则只执行一次（默认）</li>
        <li><code>each</code> — 每个点值单独触发一次规则执行</li>
      </ul>
    </dd>
  </dl>

  <h3>执行逻辑</h3>
  <ol>
    <li>根据上报点值的 <code>pointId</code> 或 <code>slotPath</code> 反查 <code>pointTypeId</code></li>
    <li>根据 <code>pointTypeId</code> 查询映射表，获取关联的规则链ID列表</li>
    <li>对每个关联的规则链，构建当前点值列表</li>
    <li>解析 <code>elData</code> 执行链表达式，按顺序执行 cmp 节点</li>
    <li>输出控制/告警/恢复消息</li>
  </ol>
</script>
