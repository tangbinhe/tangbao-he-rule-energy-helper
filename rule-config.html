<script type="text/javascript">
    RED.nodes.registerType('rule-energy-config', {
        category: 'config',
        defaults: {
            name: { value: '' },
            broker: { value: 'localhost', required: true },
            port: { value: '1883', required: true, validate: RED.validators.number() },
            clientId: { value: '', required: false },
            ruleSubTopic: { value: 'cloud/rules/down', required: true },
            triggerSubTopic: { value: 'cloud/trigger/down', required: false },
            outputSubTopic: { value: 'cloud/output/down', required: false },
            statusPubTopic: { value: 'cloud/status/up', required: false }
        },
        credentials: {
            user: { type: 'text' },
            password: { type: 'password' }
        },
        label: function() {
            return this.name || (this.broker + ':' + this.port);
        }
    });
</script>

<script type="text/x-red" data-template-name="rule-energy-config">

        <label for="node-config-input-port"><i class="fa fa-plug"></i> 端口</label>

    </div>
    <div class="form-row">
        <label for="node-config-input-user"><i class="fa fa-user"></i> 用户名</label>

        <input type="password" id="node-config-input-password">

    <div class="form-row">
        <label for="node-config-input-clientId"><i class="fa fa-id-card"></i> Client ID</label>

<script type="text/x-red" data-help-name="rule-energy-config">
    <p>规则引擎云端连接配置节点，负责通过 MQTT 接收云端下发的规则、触发源关联和输出配置。</p>
    <p><b>MQTT 连接</b>：配置 Broker 地址、端口、认证信息。</p>
